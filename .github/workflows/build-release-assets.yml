name: Build Release Assets

on:
  push:
    tags:
      - "v*-en*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build, for example v1.0.0-en"
        required: true
        default: "v1.0.0-en"
      include_legacy:
        description: "Build legacy desktop installers too"
        required: false
        type: boolean
        default: false
      create_draft_release:
        description: "Create or update a draft GitHub Release with the built assets"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build_assets:
    runs-on: macos-15
    env:
      CI: ""
      NODE_OPTIONS: --max_old_space_size=4096
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            app/renderer/src/main/yarn.lock
            app/renderer/engine-link-startup/yarn.lock

      - name: Install zip helper
        run: |
          cp buildutil/zip /usr/local/bin/zip
          chmod +x /usr/local/bin/zip
          zip -h

      - name: Install dependencies
        run: |
          yarn install
          yarn install-render
          yarn install-link-render

      - name: Run validation checks
        run: |
          yarn i18n:check
          yarn ci:tsc
          yarn ci:eslint
          yarn test:vitest --run
          yarn build-renders

      - name: Download browser extension asset
        shell: bash
        run: |
          extensionVersion=$(curl -fsL "http://yaklang.oss-accelerate.aliyuncs.com/chrome-extension/latest-version.txt") || {
            echo "Failed to download extension version" >&2
            exit 1
          }
          wget -O bins/scripts/google-chrome-plugin.zip "https://yaklang.oss-accelerate.aliyuncs.com/chrome-extension/yakit-chrome-extension-v${extensionVersion}.zip"

      - name: Build desktop release assets
        shell: bash
        run: |
          if [ "${{ inputs.include_legacy }}" = "true" ]; then
            yarn pack-mac-legacy
            yarn pack-linux-legacy
            yarn pack-win-legacy
          else
            yarn pack-mac
            yarn pack-linux
            yarn pack-win
          fi

      - name: List built assets
        run: ls ./release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yakit-english-ui-${{ env.RELEASE_TAG }}-desktop-assets
          path: |
            ./release/*.exe
            ./release/*.dmg
            ./release/*.AppImage
          if-no-files-found: error
          retention-days: 7

      - name: Create or update draft GitHub Release
        if: ${{ github.event_name == 'push' || inputs.create_draft_release }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ./release/*
          bodyFile: RELEASE_NOTES_v1.0.0-en.md
          draft: true
          name: Yakit English UI ${{ env.RELEASE_TAG }}
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
