name: Build Release Assets

on:
  push:
    tags:
      - "v*-en*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build, for example v1.0.1-en"
        required: true
        default: "v1.0.0-en"
      publish_release:
        description: "Create or update the GitHub Release with the built installer"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build_windows_release:
    runs-on: windows-latest
    env:
      CI: ""
      NODE_OPTIONS: --max_old_space_size=4096
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            app/renderer/src/main/yarn.lock
            app/renderer/engine-link-startup/yarn.lock

      - name: Install dependencies
        shell: bash
        run: |
          yarn install
          yarn install-render
          yarn install-link-render

      - name: Validate localization and source tree
        shell: bash
        run: |
          yarn i18n:check

      - name: Download browser extension asset
        shell: bash
        run: |
          extensionVersion=$(curl -fsL "http://yaklang.oss-accelerate.aliyuncs.com/chrome-extension/latest-version.txt") || {
            echo "Failed to download extension version" >&2
            exit 1
          }
          wget -O bins/scripts/google-chrome-plugin.zip "https://yaklang.oss-accelerate.aliyuncs.com/chrome-extension/yakit-chrome-extension-v${extensionVersion}.zip"

      - name: Download Yak engine asset
        shell: bash
        run: |
          wget -O bins/engine-version.txt "https://yaklang.oss-accelerate.aliyuncs.com/yak/latest/version.txt"
          engineVersion=$(tr -d '\n' < bins/engine-version.txt)
          wget -O bins/yak_windows_amd64.exe "https://yaklang.oss-accelerate.aliyuncs.com/yak/${engineVersion}/yak_windows_amd64.exe"
          zip bins/yak_windows_amd64.zip bins/yak_windows_amd64.exe
          rm bins/yak_windows_amd64.exe

      - name: Build renderer bundles
        shell: bash
        run: |
          yarn build-render
          yarn build-link-render

      - name: Package Windows installer
        shell: bash
        run: |
          yarn pack-win

      - name: List built assets
        shell: bash
        run: |
          ls -la release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yakit-english-ui-${{ env.RELEASE_TAG }}-windows-assets
          path: |
            ./release/*.exe
            ./release/*.blockmap
          if-no-files-found: error
          retention-days: 7

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          # Yakit English UI ${RELEASE_TAG}

          Automated Windows release build for the English UI fork of [yaklang/yakit](https://github.com/yaklang/yakit).

          ## Included asset

          - Windows installer (\`.exe\`)

          ## Notes

          - This release is built automatically from tag \`${RELEASE_TAG}\`.
          - Source archives (\`.zip\` and \`.tar.gz\`) are generated by GitHub automatically.
          EOF

      - name: Create or update GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_release == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ./release/*.exe,./release/*.blockmap
          bodyFile: release-notes.md
          draft: false
          generateReleaseNotes: false
          name: Yakit English UI ${{ env.RELEASE_TAG }}
          omitBodyDuringUpdate: false
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
